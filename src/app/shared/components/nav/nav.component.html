<nav [class.menu_open]="menuStateService.isMenuOpen()">
  <div class="nav_container">
    <a href="/">
      <img
        class="logo"
        src="../../assets/img/logo_mobile_dark.png"
        alt="Logo"
      />
    </a>
    <div class="nav_links">
      @for (link of links; track link.id) {
        <a
          href="#{{ link.id }}"
          class="nav_link"
          [class.active]="activeLink === link.id"
          [class.hide_active]="
            activeLink === link.id && hoveredLink && hoveredLink !== link.id
          "
          (click)="setActiveLink(link.id); closeMenu()"
          (mouseover)="onHover(link.id)"
          (mouseleave)="onLeave()"
        >
          <span class="nav_bg"></span>
          <span class="nav_text">{{ link.label | translate }}</span>
        </a>
      }
    </div>
    <div class="change_language_btns">
      <p [class.active]="currentLang === 'de'" (click)="changeLanguage('de')">
        DE
      </p>
      <p [class.active]="currentLang === 'en'" (click)="changeLanguage('en')">
        EN
      </p>
    </div>

    <button class="burger_menu" (click)="toggleMenu()">
      @if (!menuStateService.isMenuOpen()) {
        <span class="burger_icon">☰</span>
      } @else {
        <span class="menu_icon">✖</span>
      }
    </button>
  </div>
</nav>
